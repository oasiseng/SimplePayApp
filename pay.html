<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oasis Engineering — Service Agreement & Payment</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600;9..144,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --oasis-blue: #2c5fa8;
            --oasis-blue-light: #e8eff8;
            --oasis-blue-dark: #1e3f6f;
            --oasis-green: #1a6b4a;
            --oasis-green-light: #e8f5ee;
            --oasis-green-dark: #0d4a31;
            --oasis-sand: #f7f3ed;
            --oasis-sand-dark: #e8e0d4;
            --oasis-charcoal: #1a1a1a;
            --oasis-slate: #4a5568;
            --oasis-white: #ffffff;
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--oasis-sand);
            color: var(--oasis-charcoal);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* --- Top Banner --- */
        .top-bar {
            background: var(--oasis-blue-dark);
            color: var(--oasis-white);
            text-align: center;
            padding: 8px 16px;
            font-size: 11px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-weight: 500;
        }

        /* --- Header --- */
        .header {
            background: var(--oasis-white);
            border-bottom: 1px solid var(--oasis-sand-dark);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header-brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .header-brand img {
            height: 42px;
        }
        .header-text h1 {
            font-family: 'Fraunces', serif;
            font-size: 17px;
            font-weight: 600;
            color: var(--oasis-charcoal);
            line-height: 1.2;
        }
        .header-text span {
            font-size: 11px;
            color: var(--oasis-slate);
            letter-spacing: 0.5px;
        }
        .header-badge {
            background: var(--oasis-blue-light);
            color: var(--oasis-blue);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .header-badge::before {
            content: '';
            width: 7px;
            height: 7px;
            background: var(--oasis-blue);
            border-radius: 50%;
        }

        /* --- Main Content --- */
        .main {
            max-width: 760px;
            margin: 0 auto;
            padding: 28px 20px 80px;
        }

        /* --- Invoice Hero --- */
        .invoice-hero {
            background: linear-gradient(135deg, var(--oasis-blue-dark) 0%, var(--oasis-blue) 100%);
            border-radius: var(--radius) var(--radius) 0 0;
            padding: 32px 28px 24px;
            color: var(--oasis-white);
            position: relative;
            overflow: hidden;
        }
        .invoice-hero::after {
            content: '';
            position: absolute;
            top: -40px; right: -40px;
            width: 160px; height: 160px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
        }
        .invoice-hero .invoice-label {
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.65;
            margin-bottom: 3px;
        }
        .invoice-hero .invoice-id {
            font-family: 'Fraunces', serif;
            font-size: 14px;
            font-weight: 400;
            opacity: 0.8;
            margin-bottom: 18px;
        }
        .invoice-hero .amount {
            font-family: 'Fraunces', serif;
            font-size: 44px;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 5px;
        }
        .invoice-hero .amount-note {
            font-size: 12px;
            opacity: 0.65;
        }
        .invoice-hero .schedule-note {
            margin-top: 12px;
            font-size: 12px;
            opacity: 0.75;
            padding: 8px 12px;
            background: rgba(255,255,255,0.08);
            border-radius: 8px;
            display: inline-block;
        }

        /* --- Card Body --- */
        .card {
            background: var(--oasis-white);
            border-radius: 0 0 var(--radius) var(--radius);
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
            overflow: hidden;
        }

        /* --- Section --- */
        .section {
            padding: 24px 28px;
            border-bottom: 1px solid var(--oasis-sand-dark);
        }
        .section:last-child { border-bottom: none; }
        .section-title {
            font-family: 'Fraunces', serif;
            font-size: 15px;
            font-weight: 600;
            color: var(--oasis-charcoal);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title .icon {
            width: 26px; height: 26px;
            background: var(--oasis-blue-light);
            border-radius: 7px;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px;
        }

        /* --- Detail Grid --- */
        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        @media (max-width: 500px) { .detail-grid { grid-template-columns: 1fr; } }
        .detail-item label {
            display: block;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--oasis-slate);
            margin-bottom: 3px;
        }
        .detail-item p {
            font-size: 14px;
            font-weight: 500;
            color: var(--oasis-charcoal);
        }
        .detail-full { grid-column: 1 / -1; }

        /* --- Editable Intake Fields --- */
        .intake-field {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid var(--oasis-sand-dark);
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            color: var(--oasis-charcoal);
            background: var(--oasis-white);
            transition: border-color 0.2s;
        }
        .intake-field:focus {
            outline: none;
            border-color: var(--oasis-blue);
            background: var(--oasis-blue-light);
        }
        .intake-field::placeholder { color: #aaa; }
        select.intake-field {
            appearance: auto;
        }
        textarea.intake-field { resize: vertical; min-height: 60px; }
        .intake-badge {
            display: inline-block;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: var(--oasis-blue-light);
            color: var(--oasis-blue);
            padding: 2px 8px;
            border-radius: 4px;
            margin-left: 8px;
            font-weight: 600;
        }

        /* --- Line Items / Pricing --- */
        .line-items { width: 100%; }
        .line-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 10px 0;
            border-bottom: 1px dashed var(--oasis-sand-dark);
        }
        .line-item:last-child { border-bottom: none; }
        .line-item .desc {
            font-size: 13px;
            color: var(--oasis-charcoal);
            flex: 1;
        }
        .line-item .desc small {
            display: block;
            font-size: 11px;
            color: var(--oasis-slate);
            margin-top: 2px;
        }
        .line-item .price {
            font-weight: 600;
            font-size: 14px;
            color: var(--oasis-charcoal);
            white-space: nowrap;
            margin-left: 16px;
        }
        .line-item.discount .price { color: #dc2626; }
        .line-total {
            display: flex;
            justify-content: space-between;
            padding: 14px 0 0;
            border-top: 2px solid var(--oasis-charcoal);
            margin-top: 6px;
        }
        .line-total .desc { font-weight: 700; font-size: 14px; }
        .line-total .price {
            font-family: 'Fraunces', serif;
            font-weight: 700;
            font-size: 20px;
            color: var(--oasis-blue);
        }

        /* --- Deliverables checklist --- */
        .deliverables-list {
            background: var(--oasis-sand);
            border-radius: 8px;
            padding: 14px 16px;
            margin-top: 12px;
        }
        .deliverables-list .del-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--oasis-slate);
            margin-bottom: 8px;
            font-weight: 600;
        }
        .del-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 0;
            font-size: 12px;
            color: var(--oasis-charcoal);
        }
        .del-item::before {
            content: '✓';
            color: var(--oasis-blue);
            font-weight: 700;
            font-size: 11px;
            width: 18px; height: 18px;
            background: var(--oasis-blue-light);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }

        /* --- Service Description Box --- */
        .service-detail-box {
            background: linear-gradient(135deg, #f0f5ff 0%, var(--oasis-sand) 100%);
            border: 1px solid var(--oasis-blue-light);
            border-radius: 10px;
            padding: 18px 20px;
            margin-bottom: 16px;
        }
        .service-detail-box .sdb-title {
            font-family: 'Fraunces', serif;
            font-size: 15px;
            font-weight: 600;
            color: var(--oasis-blue-dark);
            margin-bottom: 6px;
        }
        .service-detail-box .sdb-overview {
            font-size: 12.5px;
            color: var(--oasis-slate);
            line-height: 1.5;
            margin-bottom: 12px;
        }
        .service-detail-box .sdb-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: var(--oasis-blue);
            font-weight: 700;
            margin-top: 12px;
            margin-bottom: 6px;
        }
        .service-detail-box .sdb-item {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            padding: 3px 0;
            font-size: 12px;
            color: var(--oasis-charcoal);
            line-height: 1.4;
        }
        .service-detail-box .sdb-item::before {
            content: '✓';
            color: var(--oasis-blue);
            font-weight: 700;
            font-size: 10px;
            width: 16px; height: 16px;
            background: rgba(44,95,168,0.1);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            margin-top: 1px;
        }
        .service-detail-box .sdb-step {
            display: flex; align-items: flex-start; gap: 8px;
            padding: 3px 0; font-size: 12px; color: var(--oasis-charcoal); line-height: 1.4;
        }
        .service-detail-box .sdb-step .step-num {
            width: 18px; height: 18px; border-radius: 50%;
            background: var(--oasis-blue); color: #fff;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: 700; flex-shrink: 0;
        }
        .service-detail-box .sdb-note {
            font-size: 11px;
            color: var(--oasis-slate);
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(0,0,0,0.06);
            font-style: italic;
        }

        /* --- Client Add-on Cards --- */
        .addon-cards {
            margin-top: 16px;
            border-top: 1px solid var(--oasis-sand-dark);
            padding-top: 16px;
        }
        .addon-cards-title {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--oasis-slate);
            margin-bottom: 10px;
        }
        .addon-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            border: 1px solid var(--oasis-sand-dark);
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.15s;
            background: var(--oasis-white);
        }
        .addon-card:hover {
            border-color: var(--oasis-blue);
            background: var(--oasis-blue-light);
        }
        .addon-card.selected {
            border-color: var(--oasis-blue);
            background: var(--oasis-blue-light);
        }
        .addon-card .addon-check {
            width: 20px; height: 20px;
            border: 2px solid var(--oasis-sand-dark);
            border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; flex-shrink: 0; transition: all 0.15s;
            color: transparent;
        }
        .addon-card.selected .addon-check {
            background: var(--oasis-blue);
            border-color: var(--oasis-blue);
            color: white;
        }
        .addon-card .addon-info { flex: 1; }
        .addon-card .addon-name { font-size: 13px; font-weight: 600; color: var(--oasis-charcoal); }
        .addon-card .addon-desc { font-size: 11px; color: var(--oasis-slate); margin-top: 1px; }
        .addon-card .addon-price {
            font-size: 14px; font-weight: 700;
            color: var(--oasis-blue);
            white-space: nowrap;
        }

        /* --- File Upload --- */
        .upload-zone {
            border: 2px dashed var(--oasis-sand-dark);
            border-radius: 10px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--oasis-sand);
        }
        .upload-zone:hover {
            border-color: var(--oasis-blue);
            background: var(--oasis-blue-light);
        }
        .upload-zone.dragover {
            border-color: var(--oasis-blue);
            background: var(--oasis-blue-light);
        }
        .upload-zone .upload-icon {
            font-size: 28px;
            margin-bottom: 8px;
        }
        .upload-zone .upload-text {
            font-size: 13px;
            color: var(--oasis-slate);
        }
        .upload-zone .upload-text strong {
            color: var(--oasis-blue);
            cursor: pointer;
        }
        .upload-zone .upload-hint {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
        }
        .file-list {
            margin-top: 12px;
        }
        .file-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background: var(--oasis-white);
            border: 1px solid var(--oasis-sand-dark);
            border-radius: 8px;
            margin-bottom: 6px;
        }
        .file-item .file-icon { font-size: 18px; }
        .file-item .file-info { flex: 1; }
        .file-item .file-name { font-size: 13px; font-weight: 500; }
        .file-item .file-size { font-size: 11px; color: var(--oasis-slate); }
        .file-item .file-remove {
            background: none; border: none;
            color: #dc2626; cursor: pointer;
            font-size: 16px; padding: 4px;
        }

        /* --- Terms (collapsible) --- */
        .terms-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            padding: 0;
            background: none;
            border: none;
            width: 100%;
            text-align: left;
        }
        .terms-toggle .arrow {
            transition: transform 0.2s;
            font-size: 12px;
            color: var(--oasis-slate);
        }
        .terms-toggle.open .arrow { transform: rotate(180deg); }
        .terms-content {
            display: none;
            margin-top: 14px;
        }
        .terms-content.open { display: block; }
        .terms-section {
            margin-bottom: 16px;
        }
        .terms-section h4 {
            font-family: 'Fraunces', serif;
            font-size: 13px;
            font-weight: 600;
            color: var(--oasis-charcoal);
            margin-bottom: 5px;
        }
        .terms-section p, .terms-section ul {
            font-size: 12px;
            line-height: 1.7;
            color: var(--oasis-slate);
        }
        .terms-section ul {
            padding-left: 20px;
            margin-top: 4px;
        }
        .terms-section ul li {
            margin-bottom: 3px;
        }
        .terms-download {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 12px;
            padding: 8px 16px;
            background: var(--oasis-sand);
            border: 1px solid var(--oasis-sand-dark);
            border-radius: 8px;
            font-size: 12px;
            color: var(--oasis-blue);
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.15s;
        }
        .terms-download:hover {
            background: var(--oasis-blue-light);
            border-color: var(--oasis-blue);
        }

        /* --- E-Signature --- */
        .signature-pad-wrapper {
            border: 2px solid var(--oasis-sand-dark);
            border-radius: 10px;
            overflow: hidden;
            background: var(--oasis-white);
            position: relative;
        }
        .signature-pad-wrapper canvas {
            width: 100%;
            height: 160px;
            cursor: crosshair;
            display: block;
        }
        .signature-pad-wrapper .sig-placeholder {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 13px;
            color: #ccc;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        .signature-pad-wrapper.has-signature .sig-placeholder { opacity: 0; }
        .sig-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 8px;
        }
        .sig-actions button {
            padding: 5px 14px;
            font-size: 11px;
            font-family: 'DM Sans', sans-serif;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid var(--oasis-sand-dark);
            background: var(--oasis-white);
            color: var(--oasis-slate);
            transition: all 0.15s;
        }
        .sig-actions button:hover {
            border-color: var(--oasis-blue);
            color: var(--oasis-blue);
        }

        /* --- Consent + Pay --- */
        .consent-row {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 20px;
        }
        .consent-row input[type="checkbox"] {
            margin-top: 3px;
            width: 18px; height: 18px;
            accent-color: var(--oasis-blue);
            flex-shrink: 0;
            cursor: pointer;
        }
        .consent-row label {
            font-size: 12px;
            color: var(--oasis-slate);
            cursor: pointer;
            line-height: 1.6;
        }
        .consent-row label strong { color: var(--oasis-charcoal); }

        .pay-btn {
            display: block;
            width: 100%;
            padding: 16px;
            background: var(--oasis-blue);
            color: var(--oasis-white);
            border: none;
            border-radius: var(--radius);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.3px;
        }
        .pay-btn:hover:not(:disabled) {
            background: var(--oasis-blue-dark);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(44,95,168,0.3);
        }
        .pay-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .secure-note {
            text-align: center;
            margin-top: 12px;
            font-size: 10px;
            color: var(--oasis-slate);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .secure-note svg { opacity: 0.5; }

        /* --- Footer --- */
        .footer {
            text-align: center;
            padding: 28px 20px;
            font-size: 11px;
            color: var(--oasis-slate);
        }
        .footer a {
            color: var(--oasis-blue);
            text-decoration: none;
        }

        /* --- Status Paid --- */
        .status-paid {
            background: var(--oasis-green-light);
            border: 2px solid var(--oasis-green);
            border-radius: var(--radius);
            padding: 24px;
            text-align: center;
        }
        .status-paid h3 {
            font-family: 'Fraunces', serif;
            color: var(--oasis-green);
            font-size: 20px;
            margin-bottom: 6px;
        }
        .status-paid p {
            font-size: 13px;
            color: var(--oasis-slate);
        }

        /* --- Loading skeleton --- */
        .skeleton {
            background: linear-gradient(90deg, var(--oasis-sand-dark) 25%, var(--oasis-sand) 50%, var(--oasis-sand-dark) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 6px;
            height: 18px;
            margin-bottom: 10px;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* --- Responsive --- */
        @media (max-width: 600px) {
            .header { flex-direction: column; gap: 12px; align-items: flex-start; }
            .invoice-hero { padding: 24px 18px 20px; }
            .invoice-hero .amount { font-size: 34px; }
            .section { padding: 20px 18px; }
            .main { padding: 16px 10px 60px; }
        }

        @media print {
            .top-bar, .header-badge, .upload-zone, .sig-actions,
            .pay-btn, .secure-note, .consent-row { display: none !important; }
            body { background: white; }
            .main { padding: 0; max-width: none; }
            .invoice-hero { background: var(--oasis-blue-dark) !important; print-color-adjust: exact; }
        }
    </style>
</head>
<body>

<div class="top-bar">Oasis Engineering — Energy & Wind Calculation Services</div>

<header class="header">
    <div class="header-brand">
        <img src="OasisLogo.PNG" alt="Oasis Engineering">
        <div class="header-text">
            <h1>Oasis Engineering</h1>
            <span>Your City, ST — FSEC Certified Energy Specialist</span>
        </div>
    </div>
    <div class="header-badge" id="statusBadge">Invoice Active</div>
</header>

<main class="main" id="app">
    <!-- Content rendered by JS -->
</main>

<footer class="footer">
    &copy; 2026 Oasis Engineering &middot; 3702 W Spruce St, #1033 Your City, ST 33607<br>
    <a href="https://yourcompany.com">yourcompany.com</a> &middot;
    <a href="https://windcalculations.com">windcalculations.com</a> &middot;
    555-123-4567
</footer>

<!-- Hidden file input -->
<input type="file" id="fileInput" multiple accept=".pdf,.jpg,.jpeg,.png,.doc,.docx,.dwg,.dxf,.xlsx,.csv" style="display:none;">

<script>
    // ====================================

    // ====================================
    // FILE UPLOAD
    // ====================================
    function initFileUpload() {
        const zone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');

        if (!zone) return;

        zone.addEventListener('dragover', (e) => {
            e.preventDefault();
            zone.classList.add('dragover');
        });
        zone.addEventListener('dragleave', () => {
            zone.classList.remove('dragover');
        });
        zone.addEventListener('drop', (e) => {
            e.preventDefault();
            zone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });
        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
            fileInput.value = ''; // reset so same file can be added again
        });
    }

    function handleFiles(files) {
        for (const file of files) {
            if (file.size > 25 * 1024 * 1024) {
                alert(`File "${file.name}" is too large (max 25MB).`);
                continue;
            }
            uploadedFiles.push(file);
        }
        renderFileList();
    }

    function renderFileList() {
        const list = document.getElementById('fileList');
        if (!list) return;

        list.innerHTML = uploadedFiles.map((file, i) => {
            const ext = file.name.split('.').pop().toLowerCase();
            const icons = { pdf: '📄', jpg: '🖼️', jpeg: '🖼️', png: '🖼️', doc: '📝', docx: '📝', dwg: '📐', xlsx: '📊' };
            const icon = icons[ext] || '📎';
            const size = file.size < 1024 ? file.size + ' B'
                : file.size < 1048576 ? (file.size / 1024).toFixed(1) + ' KB'
                : (file.size / 1048576).toFixed(1) + ' MB';

            return `
                <div class="file-item">
                    <span class="file-icon">${icon}</span>
                    <div class="file-info">
                        <div class="file-name">${file.name}</div>
                        <div class="file-size">${size}</div>
                    </div>
                    <button class="file-remove" onclick="removeFile(${i})" title="Remove">×</button>
                </div>
            `;
        }).join('');
    }

    function removeFile(index) {
        uploadedFiles.splice(index, 1);
        renderFileList();
    }

    // ====================================
    // E-SIGNATURE PAD
    // ====================================
    function initSignaturePad() {
        signatureCanvas = document.getElementById('signatureCanvas');
        if (!signatureCanvas) return;

        const wrapper = signatureCanvas.parentElement;
        const rect = wrapper.getBoundingClientRect();
        signatureCanvas.width = rect.width;
        signatureCanvas.height = 160;

        signatureCtx = signatureCanvas.getContext('2d');
        signatureCtx.strokeStyle = '#1a1a1a';
        signatureCtx.lineWidth = 2.5;
        signatureCtx.lineCap = 'round';
        signatureCtx.lineJoin = 'round';

        // Mouse events
        signatureCanvas.addEventListener('mousedown', startDraw);
        signatureCanvas.addEventListener('mousemove', draw);
        signatureCanvas.addEventListener('mouseup', stopDraw);
        signatureCanvas.addEventListener('mouseleave', stopDraw);

        // Touch events
        signatureCanvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            startDraw({ offsetX: touch.clientX - signatureCanvas.getBoundingClientRect().left, offsetY: touch.clientY - signatureCanvas.getBoundingClientRect().top });
        });
        signatureCanvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            draw({ offsetX: touch.clientX - signatureCanvas.getBoundingClientRect().left, offsetY: touch.clientY - signatureCanvas.getBoundingClientRect().top });
        });
        signatureCanvas.addEventListener('touchend', stopDraw);

        // Resize handler
        window.addEventListener('resize', () => {
            const newRect = wrapper.getBoundingClientRect();
            // Save current drawing
            const imageData = signatureCanvas.toDataURL();
            signatureCanvas.width = newRect.width;
            signatureCanvas.height = 160;
            signatureCtx.strokeStyle = '#1a1a1a';
            signatureCtx.lineWidth = 2.5;
            signatureCtx.lineCap = 'round';
            signatureCtx.lineJoin = 'round';
            // Restore drawing
            if (hasSigned) {
                const img = new Image();
                img.onload = () => signatureCtx.drawImage(img, 0, 0);
                img.src = imageData;
            }
        });
    }

    function startDraw(e) {
        isDrawing = true;
        signatureCtx.beginPath();
        signatureCtx.moveTo(e.offsetX, e.offsetY);
    }

    function draw(e) {
        if (!isDrawing) return;
        signatureCtx.lineTo(e.offsetX, e.offsetY);
        signatureCtx.stroke();
        hasSigned = true;
        document.getElementById('sigWrapper').classList.add('has-signature');
        checkPayReady();
    }

    function stopDraw() {
        isDrawing = false;
    }

    function clearSignature() {
        if (!signatureCtx || !signatureCanvas) return;
        signatureCtx.clearRect(0, 0, signatureCanvas.width, signatureCanvas.height);
        hasSigned = false;
        document.getElementById('sigWrapper').classList.remove('has-signature');
        checkPayReady();
    }

    function getSignatureData() {
        if (!hasSigned || !signatureCanvas) return null;
        return signatureCanvas.toDataURL('image/png');
    }

        return Object.values(selectedClientAddons).reduce((sum, a) => sum + a.price, 0);

        const inv = getInvoice();
        return inv.total + getAddonTotal();

        const inv = getInvoice();

        const grandTotal = inv.total + addonTotal;

    // ====================================
    // HANDLE PAYMENT
    // ====================================
    function handlePay() {
        const btn = document.getElementById('payBtn');
        btn.textContent = 'Processing...';
        btn.disabled = true;

        const inv = getInvoice();

        // Collect intake data from form
        const intakeData = {
            project_type: document.getElementById('intake_project_type')?.value || '',
            sqft: document.getElementById('intake_sqft')?.value || '',
            system_type: document.getElementById('intake_system_type')?.value || '',
            ductwork_status: document.getElementById('intake_ductwork_status')?.value || '',
            duct_location: document.getElementById('intake_duct_location')?.value || '',
            hvac_info: document.getElementById('intake_hvac_info')?.value || '',
            wall_insulation: document.getElementById('intake_wall_insulation')?.value || '',
            ceiling_insulation: document.getElementById('intake_ceiling_insulation')?.value || '',
            notes: document.getElementById('intake_notes')?.value || ''
        };

        // Collect selected client add-ons
        const clientAddons = Object.values(selectedClientAddons).map(a => ({
            id: a.id,
            name: a.name,
            price: a.price
        }));

        // Save intake + signature + addons data before redirecting to Stripe
        const saveData = {
            invoice_id: inv.id,
            intake: intakeData,
            signature: getSignatureData(),
            files_count: uploadedFiles.length,
            client_addons: clientAddons,
            grand_total: getGrandTotal()
        };

        // Upload files if any
        if (uploadedFiles.length > 0) {
            const formData = new FormData();
            formData.append('invoice_id', inv.id);
            formData.append('intake', JSON.stringify(intakeData));
            formData.append('signature', getSignatureData() || '');
            uploadedFiles.forEach((file, i) => {
                formData.append('files[]', file);
            });

            fetch('/api/upload-files.php', {
                method: 'POST',
                body: formData
            }).then(() => {
                redirectToStripe(inv, btn);
            }).catch(() => {
                // Still redirect to payment even if upload fails
                redirectToStripe(inv, btn);
            });
        } else {
            // Save intake + signature without files
            fetch('/api/save-intake.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(saveData)
            }).then(() => {
                redirectToStripe(inv, btn);
            }).catch(() => {
                redirectToStripe(inv, btn);
            });
        }
    }

    function redirectToStripe(inv, btn) {
        if (inv.stripeSessionUrl) {
            window.location.href = inv.stripeSessionUrl;
            return;
        }

        fetch('/api/create-checkout.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ invoice_id: inv.id })
        })
        .then(r => r.json())
        .then(data => {
            if (data.url) {
                window.location.href = data.url;
            } else {
                alert('Error creating checkout session. Please try again.');
                btn.textContent = `Agree & Pay $${inv.total.toFixed(2)} — Secure Checkout`;
                btn.disabled = false;
            }
        })
        .catch(() => {
            alert('Connection error. Please try again.');
            btn.textContent = `Agree & Pay $${inv.total.toFixed(2)} — Secure Checkout`;
            btn.disabled = false;
        });
    }
